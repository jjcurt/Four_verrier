; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32_four]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; File system configuration for web files and OTA updates
board_build.filesystem = littlefs
board_build.partitions = huge_app.csv
upload_speed = 921600

; Enable filesystem, OTA, and task debugging
build_flags = 
    -DCORE_DEBUG_LEVEL=1
    -DCONFIG_LITTLEFS_FOR_IDF_3_2
    -Ilib/RelaySerial/include
    -DUSER_SETUP_LOADED=1
    -include include/User_Setup.h

; Configure source files to build
build_src_filter = +<*> -<.git/> -<.svn/> -<example/> -<examples/> -<test/> -<tests/> -<*/relay_nano.ino>

; Required libraries with fixed versions for stability
lib_deps = 
    ; Core functionality
    adafruit/MAX6675 library@^1.1.2            ; Temperature sensor
    br3ttb/PID@^1.2.1                          ; PID control
    bodmer/TFT_eSPI@^2.5.43                    ; Display driver
    
    ; Web server and async features
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/AsyncTCP.git
    
    ; File system and utils
    bblanchon/ArduinoJson@^6.21.3              ; JSON processing
    plerup/EspSoftwareSerial@^6.12.6          ; Software serial for relay control
    
; Enable verbose output during build
build_type = debug

[env:nano_avr]
platform = atmelavr
board = uno
framework = arduino
; Build only the Nano sketch placed under tools/nano
; Build the Nano sketch placed under src/relay_nano.ino (copied from tools/nano)
build_src_filter = +<src/relay_nano.ino>
monitor_speed = 115200
