# =============================================================================
# nginx-kiln.conf — Serveur web local Four Verrier Analyse
#
# Installation :
#   sudo cp nginx-kiln.conf /etc/nginx/conf.d/kiln.conf
#   sudo systemctl enable --now php-fpm
#   sudo systemctl reload nginx
#
# Accès local : http://<IP-PC>:8080   (ex : http://192.168.0.X:8080)
# =============================================================================

server {
    listen      8080;
    server_name _;
    charset     utf-8;

    # Racine de l'application PHP
    root  /home/jcurt/Développements/Four/Four_verrier/analysis/webapp;
    index index.php;

    # Taille max upload (fichiers CSV)
    client_max_body_size 64M;

    # Pages PHP
    location / {
        try_files $uri /index.php$is_args$args;

        location ~ \.php$ {
            fastcgi_pass   unix:/run/php-fpm/www.sock;
            fastcgi_index  index.php;
            include        fastcgi_params;
            fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;

            # Timeout long pour l'ingestion (ingest.py peut prendre qqes secondes)
            fastcgi_read_timeout 120;
        }
    }

    # Photos stockées hors de la racine web — alias direct
    location /photos/ {
        alias /home/jcurt/Développements/Four/Four_verrier/analysis/photos/;
        add_header Cache-Control "public, max-age=86400";
        # Interdit de lister le répertoire
        autoindex off;
    }

    # Fichiers statiques (CSS, JS éventuels)
    location /assets/ {
        expires 1h;
        add_header Cache-Control "public";
    }

    # Sécurité : bloquer l'accès aux fichiers PHP internes
    location ~ ^/_(layout|config)\.php$ {
        deny all;
    }
}
